<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>BODMAS Bus Express - Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <!-- Top Navigation Bar -->
        <div class="top-bar">
            <div class="player-info">
                <span class="player-avatar" id="playerAvatar">👦</span>
                <span class="player-name" id="playerNameDisplay">Player</span>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-icon">⭐</span>
                    <span id="scoreDisplay">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">🔥</span>
                    <span id="streakDisplay">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">❌</span>
                    <span id="mistakesDisplay">0</span>
                </div>
            </div>
            <button id="resetGameBtn" class="btn-reset">🔄 Reset</button>
        </div>

        <!-- Journey Path -->
        <div class="journey-path">
            
            <div class="milestone" data-milestone="home">
                <span class="milestone-icon">🏠</span>
                <span class="milestone-label">Home</span>
            </div>
            <div class="path-line"></div>
            <div class="milestone" data-milestone="busstop">
                <span class="milestone-icon">🚏</span>
                <span class="milestone-label">Bus Stop</span>
            </div>
            <div class="path-line"></div>
            <div class="milestone" data-milestone="school">
                <span class="milestone-icon">🏫</span>
                <span class="milestone-label">School</span>
            </div>
            <div class="path-line"></div>
            <div class="milestone" data-milestone="park">
                <span class="milestone-icon">🌳</span>
                <span class="milestone-label">Park</span>
            </div>
            <div class="path-line"></div>
            <div class="milestone" data-milestone="picnic">
                <span class="milestone-icon">🧺</span>
                <span class="milestone-label">Picnic</span>
            </div>
        </div>

        <!-- Bus Progress -->
        <div class="bus-progress">
            <div class="bus-icon" id="busIcon">🚌</div>
        </div>

        <!-- Level Display -->
        

        <!-- Main Game Area -->
        <div class="game-area">
            <!-- Expression Display -->
            <div class="expression-card">
                <div class="expression" id="expressionDisplay">4 × 3 ÷ 2</div>
                <div class="level-info">
                    <span class="level-badge" id="levelBadge">Level 1: Beginner</span>
                    <div class="step-hint" id="stepHint">Which operation to solve FIRST?</div>
            
                    <span class="progress-text" id="progressText">Expression 1/5</span>
                </div>
                </div>

            <!-- Operator Buttons -->
            <!-- In your game.html, update operator buttons -->
            <div class="operators-grid">
                <button class="operator-btn" data-operator="+">+</button>
                <button class="operator-btn" data-operator="-">-</button>
                <button class="operator-btn" data-operator="×">×</button>
                <button class="operator-btn" data-operator="÷">÷</button>
                <button class="operator-btn bracket-btn" data-operator="round_bracket">( )</button>
                <button class="operator-btn bracket-btn" data-operator="square_bracket">[ ]</button>
                <button class="operator-btn bracket-btn" data-operator="curly_bracket">{ }</button>
            </div>

            <!-- Hint Button -->
            <button id="hintBtn" class="btn-hint">💡 Get Hint</button>

            <!-- Step-by-Step Solution Panel -->
            <div class="solution-panel" id="solutionPanel">
                <h3>📝 Step-by-Step Solution</h3>
                <div id="stepsList"></div>
            </div>

            <!-- Feedback Message -->
            <div class="feedback" id="feedback"></div>
        </div>

        <!-- Completion Modal (Hidden by default) -->
        <div id="completionModal" class="modal">
            <div class="modal-content">
                <h2>🎉 CONGRATULATIONS! 🎉</h2>
                <p id="completionMessage">You've completed the journey!</p>
                <div class="certificate-preview">
                    <p>🏆 BODMAS MASTER 🏆</p>
                    <p id="certificateName"></p>
                    <p>Score: <span id="finalScore"></span></p>
                </div>
                <button id="playAgainBtn" class="btn-primary">Play Again 🚌</button>
                <button id="shareBtn" class="btn-secondary">📤 Share</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
